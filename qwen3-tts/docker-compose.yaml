services:
  magpietts:
    build: .
    container_name: magpietts
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - hf-cache:/cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  hf-cache:
